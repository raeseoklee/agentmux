name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to release, without the v prefix"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  windows-nsis:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          } else {
            $version = "${{ inputs.version }}"
            $tag = "v$version"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$') {
            throw "Invalid AgentMux release version '$version'. Expected SemVer such as 0.1.1 or 0.2.0-rc.1."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check version consistency
        shell: pwsh
        run: npm run version:check -- --tag "${{ steps.version.outputs.tag }}"

      - name: Install desktop dependencies
        shell: pwsh
        run: npm --prefix apps/desktop ci

      - name: Prepare desktop sidecars
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/prepare-desktop-bundle-binaries.ps1

      - name: Build NSIS installer
        shell: pwsh
        working-directory: apps/desktop
        run: npm run tauri:build -- --ci --no-sign -b nsis

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "target\release\bundle\nsis"
          $installer = Get-ChildItem -LiteralPath $sourceDir -Filter "*setup.exe" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced under $sourceDir."
          }

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "dist\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $installerPath = Join-Path $releaseDir $installer.Name
          Copy-Item -LiteralPath $installer.FullName -Destination $installerPath -Force

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installerPath
          $checksumPath = "$installerPath.sha256"
          "{0}  {1}" -f $hash.Hash, $installer.Name |
            Set-Content -LiteralPath $checksumPath -Encoding ASCII

          "installer=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "checksum=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "installer_name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$($hash.Hash)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/release/*.exe

      - name: Write release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $installerName = "${{ steps.assets.outputs.installer_name }}"
          $sha256 = "${{ steps.assets.outputs.sha256 }}"
          @"
          ## AgentMux $version

          Windows NSIS installer for $tag.

          - Installer: ``$installerName``
          - SHA256: ``$sha256``
          - Provenance: GitHub Artifact Attestation generated by this workflow.

          Verify the downloaded installer:

          ````powershell
          gh attestation verify .\$installerName --repo $env:GITHUB_REPOSITORY
          Get-FileHash -Algorithm SHA256 .\$installerName
          ````
          "@ | Set-Content -LiteralPath release-notes.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $installer = "${{ steps.assets.outputs.installer }}"
          $checksum = "${{ steps.assets.outputs.checksum }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer $checksum --clobber
            gh release edit $tag --title "AgentMux $version" --notes-file release-notes.md --latest
          } else {
            gh release create $tag $installer $checksum --target "${{ github.sha }}" --title "AgentMux $version" --notes-file release-notes.md --latest
          }

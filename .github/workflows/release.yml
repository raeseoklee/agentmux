name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to release, without the v prefix"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  windows-nsis:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $tag = "v$version"
          } else {
            $package = Get-Content -LiteralPath package.json -Raw | ConvertFrom-Json
            $version = [string]$package.version
            $tag = "v$version"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$') {
            throw "Invalid AgentMux release version '$version'. Expected SemVer such as 0.1.1 or 0.2.0-rc.1."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check version consistency
        shell: pwsh
        run: npm run version:check -- --tag "${{ steps.version.outputs.tag }}"

      - name: Install desktop dependencies
        shell: pwsh
        run: npm --prefix apps/desktop ci

      - name: Prepare desktop sidecars
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/prepare-desktop-bundle-binaries.ps1

      - name: Write updater release config
        id: updater_config
        shell: pwsh
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_PUBLIC_KEY)) {
            throw "Set repository variable TAURI_UPDATER_PUBLIC_KEY to the public key from 'tauri signer generate'."
          }

          $endpoint = "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
          $configPath = Join-Path $env:RUNNER_TEMP "tauri.updater.conf.json"
          $config = [ordered]@{
            bundle = [ordered]@{
              createUpdaterArtifacts = $true
            }
            plugins = [ordered]@{
              updater = [ordered]@{
                pubkey = $env:TAURI_UPDATER_PUBLIC_KEY
                endpoints = @($endpoint)
                windows = [ordered]@{
                  installMode = "passive"
                }
              }
            }
          }
          $config | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath $configPath -Encoding UTF8
          "path=$configPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build NSIS installer
        shell: pwsh
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Set repository secret TAURI_SIGNING_PRIVATE_KEY to the private key from 'tauri signer generate'."
          }
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_SIGNING_PRIVATE_KEY.Trim().TrimStart([char]0xFEFF)
          npm run tauri:build -- --ci -b nsis --config "${{ steps.updater_config.outputs.path }}"

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "target\release\bundle\nsis"
          Get-ChildItem -LiteralPath $sourceDir -File | Sort-Object Name | ForEach-Object {
            Write-Host ("Release bundle asset: {0}" -f $_.FullName)
          }

          $installer = Get-ChildItem -LiteralPath $sourceDir -Filter "*setup.exe" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced under $sourceDir."
          }
          $updaterArchive = Get-ChildItem -LiteralPath $sourceDir -Filter "*.zip" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $updaterArchive) {
            $installerSignatureSource = "$($installer.FullName).sig"
            if (Test-Path -LiteralPath $installerSignatureSource) {
              $updaterArchive = $installer
            } else {
              throw "Updater artifact was not produced under $sourceDir."
            }
          }
          $updaterSignatureSource = "$($updaterArchive.FullName).sig"
          if (-not (Test-Path -LiteralPath $updaterSignatureSource)) {
            throw "Updater signature was not produced at $updaterSignatureSource."
          }

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "dist\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $installerPath = Join-Path $releaseDir $installer.Name
          Copy-Item -LiteralPath $installer.FullName -Destination $installerPath -Force
          if ($updaterArchive.FullName -eq $installer.FullName) {
            $updaterArchivePath = $installerPath
          } else {
            $updaterArchivePath = Join-Path $releaseDir $updaterArchive.Name
            Copy-Item -LiteralPath $updaterArchive.FullName -Destination $updaterArchivePath -Force
          }
          $updaterSignaturePath = "$updaterArchivePath.sig"
          Copy-Item -LiteralPath $updaterSignatureSource -Destination $updaterSignaturePath -Force

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installerPath
          $checksumPath = "$installerPath.sha256"
          "{0}  {1}" -f $hash.Hash, $installer.Name |
            Set-Content -LiteralPath $checksumPath -Encoding ASCII

          $signature = (Get-Content -LiteralPath $updaterSignaturePath -Raw).Trim()
          $latestPath = Join-Path $releaseDir "latest.json"
          $downloadUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/${{ steps.version.outputs.tag }}/$($updaterArchive.Name)"
          $manifest = [ordered]@{
            version = "${{ steps.version.outputs.version }}"
            notes = "AgentMux ${{ steps.version.outputs.version }}"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ", [Globalization.CultureInfo]::InvariantCulture)
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath $latestPath -Encoding UTF8

          "installer=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "checksum=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "updater=$updaterArchivePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "updater_signature=$updaterSignaturePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "latest=$latestPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "installer_name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "updater_name=$($updaterArchive.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$($hash.Hash)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Resolve attestation support
        id: attestation
        shell: pwsh
        run: |
          $repoPrivate = "${{ github.event.repository.private }}" -eq "true"
          if ($repoPrivate) {
            "status=skipped-private-repo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "status=enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Generate artifact attestation
        if: steps.attestation.outputs.status == 'enabled'
        uses: actions/attest@v4
        with:
          subject-path: dist/release/*
          create-storage-record: false

      - name: Write release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $installerName = "${{ steps.assets.outputs.installer_name }}"
          $updaterName = "${{ steps.assets.outputs.updater_name }}"
          $sha256 = "${{ steps.assets.outputs.sha256 }}"
          $attestationStatus = "${{ steps.attestation.outputs.status }}"
          if ($attestationStatus -eq "enabled") {
            $provenance = "GitHub Artifact Attestation generated by this workflow."
            $verifyAttestation = "gh attestation verify .\$installerName --repo $env:GITHUB_REPOSITORY"
          } else {
            $provenance = "GitHub Artifact Attestation was skipped because this repository is private and owned by a user account. GitHub enables artifact attestations for public repositories on current plans, or private/internal repositories on Enterprise Cloud."
            $verifyAttestation = "# GitHub Artifact Attestation is unavailable for this repository visibility/plan."
          }

          @(
            "## AgentMux $version"
            ""
            "Windows NSIS installer for $tag."
            ""
            "- Installer: ``$installerName``"
            "- Updater artifact: ``$updaterName``"
            "- Updater manifest: ``latest.json``"
            "- SHA256: ``$sha256``"
            "- Provenance: $provenance"
            ""
            "Verify the downloaded installer:"
            ""
            '```powershell'
            $verifyAttestation
            "Get-FileHash -Algorithm SHA256 .\$installerName"
            '```'
          ) | Set-Content -LiteralPath release-notes.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $installer = "${{ steps.assets.outputs.installer }}"
          $checksum = "${{ steps.assets.outputs.checksum }}"
          $updater = "${{ steps.assets.outputs.updater }}"
          $updaterSignature = "${{ steps.assets.outputs.updater_signature }}"
          $latest = "${{ steps.assets.outputs.latest }}"
          $releaseAssets = @($installer, $checksum, $updater, $updaterSignature, $latest) |
            Sort-Object -Unique

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $releaseAssets --clobber
            gh release edit $tag --target "${{ github.sha }}" --title "AgentMux $version" --notes-file release-notes.md --latest
          } else {
            gh release create $tag $releaseAssets --target "${{ github.sha }}" --title "AgentMux $version" --notes-file release-notes.md --latest
          }

name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to release, without the v prefix"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  windows-nsis:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $tag = "v$version"
          } else {
            $package = Get-Content -LiteralPath package.json -Raw | ConvertFrom-Json
            $version = [string]$package.version
            $tag = "v$version"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$') {
            throw "Invalid AgentMux release version '$version'. Expected SemVer such as 0.1.1 or 0.2.0-rc.1."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check version consistency
        shell: pwsh
        run: npm run version:check -- --tag "${{ steps.version.outputs.tag }}"

      - name: Install desktop dependencies
        shell: pwsh
        run: npm --prefix apps/desktop ci

      - name: Prepare desktop sidecars
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/prepare-desktop-bundle-binaries.ps1

      - name: Build NSIS installer
        shell: pwsh
        working-directory: apps/desktop
        run: npm run tauri:build -- --ci --no-sign -b nsis

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "target\release\bundle\nsis"
          $installer = Get-ChildItem -LiteralPath $sourceDir -Filter "*setup.exe" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced under $sourceDir."
          }

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "dist\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $installerPath = Join-Path $releaseDir $installer.Name
          Copy-Item -LiteralPath $installer.FullName -Destination $installerPath -Force

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installerPath
          $checksumPath = "$installerPath.sha256"
          "{0}  {1}" -f $hash.Hash, $installer.Name |
            Set-Content -LiteralPath $checksumPath -Encoding ASCII

          "installer=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "checksum=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "installer_name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$($hash.Hash)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Resolve attestation support
        id: attestation
        shell: pwsh
        run: |
          $repoPrivate = "${{ github.event.repository.private }}" -eq "true"
          if ($repoPrivate) {
            "status=skipped-private-repo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "status=enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Generate artifact attestation
        if: steps.attestation.outputs.status == 'enabled'
        uses: actions/attest@v4
        with:
          subject-path: dist/release/*.exe
          create-storage-record: false

      - name: Write release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $installerName = "${{ steps.assets.outputs.installer_name }}"
          $sha256 = "${{ steps.assets.outputs.sha256 }}"
          $attestationStatus = "${{ steps.attestation.outputs.status }}"
          if ($attestationStatus -eq "enabled") {
            $provenance = "GitHub Artifact Attestation generated by this workflow."
            $verifyAttestation = "gh attestation verify .\$installerName --repo $env:GITHUB_REPOSITORY"
          } else {
            $provenance = "GitHub Artifact Attestation was skipped because this repository is private and owned by a user account. GitHub enables artifact attestations for public repositories on current plans, or private/internal repositories on Enterprise Cloud."
            $verifyAttestation = "# GitHub Artifact Attestation is unavailable for this repository visibility/plan."
          }

          @(
            "## AgentMux $version"
            ""
            "Windows NSIS installer for $tag."
            ""
            "- Installer: ``$installerName``"
            "- SHA256: ``$sha256``"
            "- Provenance: $provenance"
            ""
            "Verify the downloaded installer:"
            ""
            '```powershell'
            $verifyAttestation
            "Get-FileHash -Algorithm SHA256 .\$installerName"
            '```'
          ) | Set-Content -LiteralPath release-notes.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $installer = "${{ steps.assets.outputs.installer }}"
          $checksum = "${{ steps.assets.outputs.checksum }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer $checksum --clobber
            gh release edit $tag --target "${{ github.sha }}" --title "AgentMux $version" --notes-file release-notes.md --latest
          } else {
            gh release create $tag $installer $checksum --target "${{ github.sha }}" --title "AgentMux $version" --notes-file release-notes.md --latest
          }

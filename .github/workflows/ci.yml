name: ci

on:
  push:
  pull_request:

jobs:
  version-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run version:check

  rust-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - name: Prepare desktop sidecars
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/prepare-desktop-bundle-binaries.ps1
      - name: Prepare desktop resource stub
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path apps/desktop/dist | Out-Null
          Set-Content -Path apps/desktop/dist/index.html -Value '<!doctype html><html><body>ci</body></html>' -Encoding UTF8
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  desktop-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
        working-directory: apps/desktop
      - run: npm run build
        working-directory: apps/desktop
      - name: Prepare desktop sidecars
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/prepare-desktop-bundle-binaries.ps1
      - run: npm run tauri:build -- --debug --no-bundle --ci
        working-directory: apps/desktop

  docs-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tools/check-doc-links.mjs
